<!DOCTYPE html>
<html>
<head>
    <title>Book List</title>
</head>
<body>

<h1>Library Books</h1>

<a href="{% url 'add_book' %}">Add New Book</a>

<ul>
    {% for book in books %}
        <li>
            <strong>{{ book.title }}</strong> by {{ book.author }}
            ({{ book.publication_year }})
        </li>
    {% empty %}
        <li>No books available.</li>
    {% endfor %}
</ul>

</body>
</html>
