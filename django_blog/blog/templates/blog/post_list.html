{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Blog Posts</title>
</head>
<body>

<h1>All Blog Posts</h1>

<a href="{% url 'post-create' %}">Create New Post</a>

{% for post in posts %}
    <h2>
        <a href="{% url 'post-detail' post.pk %}">
            {{ post.title }}
        </a>
    </h2>

    <p>{{ post.content|truncatewords:20 }}</p>
    <p>By {{ post.author }}</p>

{% endfor %}

</body>
</html>
