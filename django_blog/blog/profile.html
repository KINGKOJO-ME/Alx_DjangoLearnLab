<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Profile</title>
</head>
<body>
    <h1>Profile</h1>
    <p>Username: {{ request.user.username }}</p>
    <p>Email: {{ request.user.email }}</p>

    <h2>Update Email</h2>
    <form method="post">
        {% csrf_token %}
        <input type="email" name="email" placeholder="New Email" required>
        <button type="submit">Update</button>
    </form>

    <a href="{% url 'logout' %}">Logout</a>
</body>
</html>
